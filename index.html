<script>
(function(){
  var PASSWORD = 'Cacau249';
  var DIGITAL_KEY = 'claudio_bomdia_digital_cred_id';
  var lockScreen = document.getElementById('lockScreen999');
  var digitalArea = document.getElementById('digitalArea999');
  var pwArea = document.getElementById('pwArea999');
  var digMsg = document.getElementById('digitalMsg999');
  var digBtn = document.getElementById('digitalBtn999');
  var pwInput = document.getElementById('pwInput999');
  var lockErr = document.getElementById('lockErr999');

  function unlockApp999(){ lockScreen.style.display = 'none'; }

  function showPwMode(){
    digitalArea.style.display = 'none';
    pwArea.style.display = 'flex';
    document.getElementById('switchToDigitalBtn999').style.display = localStorage.getItem(DIGITAL_KEY) ? 'block' : 'none';
    pwInput.focus();
  }
  function showDigitalMode(){
    pwArea.style.display = 'none';
    digitalArea.style.display = 'flex';
  }
  document.getElementById('switchToPwBtn999').addEventListener('click', showPwMode);
  document.getElementById('switchToDigitalBtn999').addEventListener('click', showDigitalMode);

  function tryUnlock999(){
    if (pwInput.value === PASSWORD){ unlockApp999(); }
    else { lockErr.textContent = 'Senha incorreta'; }
  }
  document.getElementById('pwEnterBtn999').addEventListener('click', tryUnlock999);
  pwInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') tryUnlock999(); });

  function b64urlToBuf(b64url){
    var b64 = b64url.replace(/-/g,'+').replace(/_/g,'/');
    var pad = b64.length % 4 === 0 ? '' : '='.repeat(4 - (b64.length % 4));
    var bin = atob(b64+pad);
    var buf = new Uint8Array(bin.length);
    for (var i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
    return buf;
  }
  function bufToB64url(buf){
    var bin=''; var bytes = new Uint8Array(buf);
    for (var i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }

  function digitalRegister(){
    try{
      digMsg.textContent = 'Cadastrando sua digital...';
      var challenge = crypto.getRandomValues(new Uint8Array(32));
      var userId = crypto.getRandomValues(new Uint8Array(16));
      navigator.credentials.create({
        publicKey: {
          challenge: challenge,
          rp: { name: 'Bom Dia' },
          user: { id: userId, name: 'claudio', displayName: 'Claudio' },
          pubKeyCredParams: [{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
          authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
          timeout: 60000,
          attestation: 'none'
        }
      }).then(function(cred){
        localStorage.setItem(DIGITAL_KEY, bufToB64url(cred.rawId));
        unlockApp999();
      }).catch(function(e){
        digMsg.textContent = 'Não deu pra cadastrar a digital. Toque em "Usar senha".';
        console.error(e);
      });
    }catch(e){
      digMsg.textContent = 'Digital não disponível aqui. Toque em "Usar senha".';
    }
  }

  function digitalAuthenticate(credId){
    try{
      digMsg.textContent = 'Toque no sensor de digital...';
      var challenge = crypto.getRandomValues(new Uint8Array(32));
      navigator.credentials.get({
        publicKey: {
          challenge: challenge,
          allowCredentials: [{ id: b64urlToBuf(credId), type: 'public-key' }],
          userVerification: 'required',
          timeout: 60000
        }
      }).then(function(){ unlockApp999(); })
      .catch(function(e){
        digMsg.textContent = 'Digital não reconhecida. Toque em "Usar senha".';
        console.error(e);
      });
    }catch(e){
      digMsg.textContent = 'Digital não disponível aqui. Toque em "Usar senha".';
    }
  }

  function initDigital(){
    try{
      if (!window.PublicKeyCredential || !navigator.credentials){
        showPwMode();
        return;
      }
      var credId = localStorage.getItem(DIGITAL_KEY);
      showDigitalMode();
      if (credId){
        digMsg.textContent = 'Toque para desbloquear com sua digital';
        digBtn.textContent = 'Usar digital';
        digBtn.onclick = function(){ digitalAuthenticate(credId); };
      } else {
        digMsg.textContent = 'Cadastre sua digital para agilizar o acesso';
        digBtn.textContent = 'Cadastrar digital';
        digBtn.onclick = digitalRegister;
      }
    }catch(e){
      showPwMode();
    }
  }
  window.addEventListener('error', showPwMode);
  initDigital();
})();
</script>

function getDiaDoAno() {
  const agora = new Date();
  const inicio = new Date(agora.getFullYear(), 0, 0);
  const diff = agora - inicio;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function desenharCena(msg, tema) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = 420, H = 420;

  // Gradiente céu
  const gradCeu = ctx.createLinearGradient(0, 0, 0, H * 0.75);
  gradCeu.addColorStop(0, tema.ceu1);
  gradCeu.addColorStop(0.5, tema.ceu2);
  gradCeu.addColorStop(1, tema.horizonte);
  ctx.fillStyle = gradCeu;
  ctx.fillRect(0, 0, W, H);

  // Estrelas
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  const estrelas = [[40,30],[80,15],[150,25],[220,10],[290,20],[350,35],[390,15],[60,60],[180,50],[310,55],[420*0.8,40]];
  estrelas.forEach(([x,y]) => {
    ctx.beginPath();
    ctx.arc(x, y, 1.5, 0, Math.PI*2);
    ctx.fill();
  });

  // Sol
  const solX = W / 2, solY = H * 0.68;
  const gradSol = ctx.createRadialGradient(solX, solY, 0, solX, solY, 55);
  gradSol.addColorStop(0, '#FFFFFF');
  gradSol.addColorStop(0.3, tema.sol);
  gradSol.addColorStop(1, tema.horizonte);
  ctx.fillStyle = gradSol;
  ctx.beginPath();
  ctx.arc(solX, solY, 50, 0, Math.PI*2);
  ctx.fill();

  // Raios do sol
  ctx.strokeStyle = 'rgba(255,220,100,0.35)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 16; i++) {
    const ang = (i * Math.PI * 2) / 16;
    ctx.beginPath();
    ctx.moveTo(solX + Math.cos(ang)*55, solY + Math.sin(ang)*55);
    ctx.lineTo(solX + Math.cos(ang)*130, solY + Math.sin(ang)*130);
    ctx.stroke();
  }

  // Colinas
  ctx.fillStyle = '#0a1a0a';
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, H*0.72);
  ctx.quadraticCurveTo(W*0.25, H*0.58, W*0.5, H*0.65);
  ctx.quadraticCurveTo(W*0.75, H*0.72, W, H*0.62);
  ctx.lineTo(W, H);
  ctx.fill();

  // Árvores esquerda
  [[30,H*0.72],[60,H*0.68],[90,H*0.70]].forEach(([x,y]) => {
    ctx.fillStyle = '#0a1a0a';
    ctx.beginPath();
    ctx.moveTo(x, y-40);
    ctx.lineTo(x-12, y);
    ctx.lineTo(x+12, y);
    ctx.fill();
  });

  // Árvores direita
  [[W-30,H*0.65],[W-60,H*0.62],[W-90,H*0.67]].forEach(([x,y]) => {
    ctx.fillStyle = '#0a1a0a';
    ctx.beginPath();
    ctx.moveTo(x, y-40);
    ctx.lineTo(x-12, y);
    ctx.lineTo(x+12, y);
    ctx.fill();
  });

  // Texto "* que o dia de hoje seja *"
  ctx.fillStyle = tema.sub_cor;
  ctx.font = 'italic 14px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText('* que o dia de hoje seja *', W/2, 80);

  // BOM DIA
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.font = 'bold 58px Georgia';
  ctx.fillText('Bom Dia', W/2+2, 142);
  ctx.fillStyle = tema.frase_cor;
  ctx.font = 'bold 58px Georgia';
  ctx.fillText('Bom Dia', W/2, 140);

  // Sub
  ctx.fillStyle = tema.sub_cor;
  ctx.font = 'italic 20px Georgia';
  ctx.fillText(msg.sub, W/2, 172);

  // Linha
  ctx.strokeStyle = tema.sub_cor;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(W/2 - 140, 182);
  ctx.lineTo(W/2 + 140, 182);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Frase
  ctx.fillStyle = tema.frase_cor;
  ctx.font = '15px Georgia';
  const linhas = msg.frase.split('\n');
  linhas.forEach((linha, i) => {
    ctx.fillText(linha, W/2, 210 + i * 24);
  });
}

function mostrarMensagem(index) {
  const lista = getMensagens();
  const msg = lista[index % lista.length];

  desenharCena(msg, tema);
  indexAtual = index;
}

function sortearSemRepetir() {
  const lista = getMensagens();
  const chave = 'bomdia_usados_' + assinatura;
  let usados = [];
  try { usados = JSON.parse(localStorage.getItem(chave)) || []; } catch(e) { usados = []; }
  if (!Array.isArray(usados) || usados.length >= lista.length) usados = [];
  const disponiveis = lista.map((_, i) => i).filter(i => !usados.includes(i));
  const escolhido = disponiveis[Math.floor(Math.random() * disponiveis.length)];
  usados.push(escolhido);
  try { localStorage.setItem(chave, JSON.stringify(usados)); } catch(e) {}
  mostrarMensagem(escolhido);
}

function proximaMensagem() {
  sortearSemRepetir();
}

function compartilhar() {
  const lista = getMensagens();
  const msg = lista[indexAtual % lista.length];
  const nome = assinatura === 'irmao' ? 'Irmão Claudio 🙏' : (assinatura === 'kimberly' ? 'Papai ❤️' : (assinatura === 'priscila' ? 'Seu amor ❤️' : 'Claudio 😊'));
  const texto = `🌅 *Bom Dia!* 🌅\n\n_${msg.sub}_\n\n${msg.frase.replace(/\n/g, ' ')}\n\n✨ _Enviado com carinho por ${nome}_`;
  const canvas = document.getElementById('canvas');

  // Tenta compartilhar com imagem (Web Share API nível 2)
  if (navigator.canShare) {
    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'bomdia.png', { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], text: texto });
          return;
        } catch(e) {
          // usuário cancelou ou erro, cai no fallback
        }
      }
      // fallback: só texto
      const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;
      window.open(url, '_blank');
    }, 'image/png');
  } else {
    // fallback para navegadores sem suporte
    const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;
    window.open(url, '_blank');
  }
}

<script>
(function(){
  function addEyeToggles(){
    document.querySelectorAll('input[type="password"]').forEach(function(inp){
      if(inp.dataset.eyeAdded) return;
      inp.dataset.eyeAdded = '1';
      var cs = window.getComputedStyle(inp);
      var hasExplicitWidth = !!inp.style.width;
      var wrap = document.createElement('span');
      wrap.style.position = 'relative';
      if(hasExplicitWidth){
        wrap.style.display = 'inline-block';
        wrap.style.width = inp.style.width;
      } else {
        wrap.style.display = 'block';
        wrap.style.width = '100%';
      }
      wrap.style.marginTop = cs.marginTop;
      wrap.style.marginBottom = cs.marginBottom;
      inp.style.marginTop = '0';
      inp.style.marginBottom = '0';
      inp.parentNode.insertBefore(wrap, inp);
      wrap.appendChild(inp);
      inp.style.width = '100%';
      inp.style.boxSizing = 'border-box';
      inp.style.paddingRight = '36px';
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('aria-label','Mostrar ou ocultar senha');
      btn.textContent = '\u{1F441}';
      btn.style.cssText = 'position:absolute;right:4px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;font-size:17px;padding:6px;line-height:1;opacity:.6;';
      btn.addEventListener('click', function(){
        var showing = inp.type === 'text';
        inp.type = showing ? 'password' : 'text';
        btn.textContent = showing ? '\u{1F441}' : '\u{1F648}';
        btn.style.opacity = showing ? '.6' : '1';
        inp.focus();
      });
      wrap.appendChild(btn);
    });
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', addEyeToggles);
  } else {
    addEyeToggles();
  }
  var obs = new MutationObserver(addEyeToggles);
  if(document.body){
    obs.observe(document.body, {childList:true, subtree:true});
  } else {
    document.addEventListener('DOMContentLoaded', function(){
      obs.observe(document.body, {childList:true, subtree:true});
    });
  }
})();
</script>
